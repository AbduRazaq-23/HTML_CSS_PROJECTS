<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glassmorphism Login Form</title>
    <style>
      /* Premium dark staging canvas */
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #030712;
        font-family: system-ui, -apple-system, sans-serif;
        overflow: hidden;
        position: relative;
      }

      /* --- BACKGROUND DECORATIVE BLOCKS (Creates depth) --- */
      .bg-circle {
        position: absolute;
        border-radius: 50%;
        filter: blur(10px);
        z-index: 1;
        animation: floatEffect 8s infinite alternate ease-in-out;
      }

      /* Top Right Purple Blob */
      .circle-1 {
        width: 150px;
        height: 150px;
        background: linear-gradient(135deg, #a855f7, #6366f1);
        top: 15%;
        right: 35%;
      }

      /* Bottom Left Pink Blob */
      .circle-2 {
        width: 150px;
        height: 150px;
        background: linear-gradient(135deg, #ec4899, #f43f5e);
        bottom: 20%;
        left: 35%;
        animation-delay: -4s; /* Offsets animations */
      }

      /* --- THE GLASSMORPHIC CARD CONTAINER --- */
      .glass-form {
        position: relative;
        z-index: 10; /* Sits cleanly above background circles */
        width: 200px;
        padding: 24px;
        border-radius: 24px;
        color: #ffffff;
        box-sizing: border-box;

        /* THE TRICK: Highly translucent background paired with backdrop filter 
*/
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px); /* Safari support */

        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      .form-title {
        margin: 0 0 24px 0;
        font-size: 20px;
        font-weight: 700;
        text-align: center;
        letter-spacing: -0.5px;
      }

      .input-field {
        width: 100%;
        padding: 5px 8px;
        margin-bottom: 20px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        color: #ffffff;
        font-size: 12px;
        outline: none;
        box-sizing: border-box;
        transition: all 0.3s ease;
      }

      /* Input focus micro-interactions */
      .input-field:focus {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.3);
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
      }

      .input-field::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }

      /* High-contrast login submit utility */
      .btn-submit {
        width: 100%;
        padding: 8px;
        background: #ffffff;
        border: none;
        border-radius: 12px;
        color: #030712;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, background-color 0.2s ease;
      }

      .btn-submit:hover {
        background: #f3f4f6;
        transform: translateY(-2px);
      }

      .btn-submit:active {
        transform: translateY(0);
      }

      /* Ambient slow floating animation for background blobs */
      @keyframes floatEffect {
        0% {
          transform: translateY(0px) rotate(0deg) scale(1);
        }
        100% {
          transform: translateY(30px) rotate(15deg) scale(1.1);
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>

    <form class="glass-form" onsubmit="return false;">
      <h2 class="form-title">Welcome Back</h2>

      <input
        type="email"
        class="input-field"
        placeholder="Email Address"
        required
      />
      <input
        type="password"
        class="input-field"
        placeholder="Password"
        required
      />

      <button type="submit" class="btn-submit">Sign In</button>
    </form>
  </body>
</html>
