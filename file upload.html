<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulsing Drop Zone</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #060814;
        font-family: system-ui, -apple-system, sans-serif;
      }

      .drop-zone {
        position: relative;
        width: 400px;
        height: 220px;
        background: #0f1123;
        border: 2px dashed #4f46e5;
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 20px;
        box-sizing: border-box;
        cursor: pointer;
        overflow: hidden;

        animation: borderPulse 2s infinite ease-in-out;
        transition: background-color 0.3s, border-color 0.3s;
      }

      .drop-zone:hover {
        background-color: #151833;
        border-color: #818cf8;
      }

      .drop-zone-input {
        position: relative;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        cursor: pointer;
        z-index: 10;
      }

      .upload-icon {
        width: 48px;
        height: 48px;
        stroke: #818cf8;
        margin-bottom: 16px;
        transition: transform 0.3s ease;
      }

      .drop-zone:hover .upload-icon {
        transform: translateY(-4px);
      }

      .drop-zone-text {
        color: #f3f4f6;
        font-size: 16px;
        font-weight: 600;
        margin: 0 0 6px 0;
      }

      .drop-zone-subtext {
        color: #64748b;
        font-size: 13px;
        margin: 0;
      }

      @keyframes borderPulse {
        0% {
          box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.2);
          border-color: #4f46e5;
        }
        50% {
          box-shadow: 0 0 20px 4px rgba(79, 70, 229, 0.4);
          border-color: #818cf8;
        }
        100% {
          box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.2);
          border-color: #4f46e5;
        }
      }
    </style>
  </head>
  <body>
    <div class="drop-zone">
      <input type="file" class="drop-zone-input" id="file-upload" />

      <svg
        class="upload-icon"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"
        />
      </svg>

      <p class="drop-zone-text">Drag & drop files here</p>
      <p class="drop-zone-subtext">or click to browse from device</p>
    </div>
  </body>
</html>
