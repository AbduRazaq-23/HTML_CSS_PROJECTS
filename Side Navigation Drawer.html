<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Side Navigation Drawer</title>
    <style>
      /* Premium dark canvas layout */
      body {
        margin: 0;
        min-height: 100vh;
        background-color: #030712;
        font-family: system-ui, -apple-system, sans-serif;
        color: #ffffff;
        overflow-x: hidden;
      }

      /* THE TRICK STEP 1: Hide the structural checkbox completely */
      #drawer-toggle {
        display: none;
      }

      /* THE HAMBURGER/OPEN TRIGGER BUTTON */
      .menu-trigger {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin: 24px;
        padding: 12px 20px;
        background-color: #111827;
        border: 1px solid #1f2937;
        border-radius: 8px;
        color: #f3f4f6;
        font-weight: 600;
        cursor: pointer;
        user-select: none;
        transition: background-color 0.2s, border-color 0.2s;
      }

      .menu-trigger:hover {
        background-color: #1f2937;
        border-color: #374151;
      }

      .hamburger-icon {
        width: 18px;
        height: 18px;
        stroke: #818cf8;
      }

      /* --- THE NAVIGATION DRAWER PANEL --- */
      .sidebar-drawer {
        position: fixed;
        top: 0;
        left: 0;
        width: 280px;
        height: 100vh;
        background-color: #0b0f19;
        border-right: 1px solid #1f2937;
        box-shadow: 25px 0 50px -12px rgba(0, 0, 0, 0.5);
        z-index: 1000;
        padding: 30px 24px;
        box-sizing: border-box;

        /* THE OFF-SCREEN TRICK: Push the panel completely left by its exact width */
        transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* THE PANEL HEADER BLOCK (Holds title & close target) */
      .drawer-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 40px;
      }

      .drawer-title {
        font-size: 18px;
        font-weight: 700;
        color: #ffffff;
        margin: 0;
      }

      .close-btn {
        background: none;
        border: none;
        color: #64748b;
        font-size: 24px;
        cursor: pointer;
        padding: 4px;
        line-height: 1;
        transition: color 0.2s;
      }

      .close-btn:hover {
        color: #f3f4f6;
      }

      /* DRAWER MENU LINKS LIST */
      .drawer-links {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .drawer-links a {
        display: flex;
        align-items: center;
        color: #9ca3af;
        text-decoration: none;
        font-size: 15px;
        font-weight: 500;
        padding: 12px 16px;
        border-radius: 8px;
        transition: color 0.2s, background-color 0.2s, transform 0.2s;
      }

      .drawer-links a:hover {
        color: #ffffff;
        background-color: #111827;
        transform: translateX(4px); /* Tiny nudge outward when targeted */
      }

      /* --- THE BACKDROP BLUR OVERLAY --- */
      .drawer-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: rgba(3, 7, 18, 0.6);
        backdrop-filter: blur(4px);
        z-index: 999;

        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s, visibility 0.3s;
      }

      /* --- THE STATE INTERACTION ENGINE --- */

      /* THE TRICK STEP 2: When checked, use the general sibling selector (~) 
       to smoothly slide the drawer panel out into full view */
      #drawer-toggle:checked ~ .sidebar-drawer {
        transform: translateX(0);
      }

      /* Fade and display the dark backdrop overlay when opened */
      #drawer-toggle:checked ~ .drawer-overlay {
        opacity: 1;
        visibility: visible;
      }
    </style>
  </head>
  <body>
    <input type="checkbox" id="drawer-toggle" />

    <label for="drawer-toggle" class="menu-trigger">
      <svg
        class="hamburger-icon"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2.5"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M4 6h16M4 12h16M4 18h16"
        />
      </svg>
      <span>Open Menu</span>
    </label>

    <label for="drawer-toggle" class="drawer-overlay"></label>

    <nav class="sidebar-drawer">
      <div class="drawer-header">
        <h3 class="drawer-title">Console Admin</h3>
        <label for="drawer-toggle" class="close-btn">&times;</label>
      </div>

      <ul class="drawer-links">
        <li><a href="#">Overview Dashboard</a></li>
        <li><a href="#">Deployment Nodes</a></li>
        <li><a href="#">Team Management</a></li>
        <li><a href="#">System Analytics</a></li>
        <li><a href="#">Settings & API Keys</a></li>
      </ul>
    </nav>
  </body>
</html>
