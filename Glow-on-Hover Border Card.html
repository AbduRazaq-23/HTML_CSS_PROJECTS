<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glow-on-Hover Border Card</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #030308;
        font-family: system-ui, -apple-system, sans-serif;
      }

      .glow-card {
        position: relative;
        width: 340px;
        height: 220px;
        border-radius: 20px;
        background-color: #0b0f19;
        padding: 32px;
        box-sizing: border-box;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        cursor: pointer;

        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .glow-card::before {
        content: "";
        position: absolute;
        top: -1px;
        left: -1px;
        right: -1px;
        bottom: -1px;
        border-radius: 20px;
        z-index: -1;

        background: linear-gradient(
          135deg,
          #00f2fe 0%,
          #4facfe 40%,
          #000000 70%,
          #00f2fe 100%
        );
        background-size: 200% auto;
        background-position: right center;

        opacity: 0.15;
        filter: blur(0px);

        transition: opacity 0.4s ease, filter 0.4s ease,
          background-position 0.6s ease;
      }

      .glow-card:hover {
        transform: translateY(-4px);
      }

      .glow-card:hover::before {
        opacity: 1;
        filter: blur(12px);
        background-position: left center;
      }

      .glow-card::after {
        content: "";
        position: absolute;
        top: 1px;
        left: 1px;
        right: 1px;
        bottom: 1px;
        background-color: #0b0f19;
        border-radius: 19px;
        z-index: -1;
      }

      .card-title {
        font-size: 20px;
        font-weight: 700;
        margin: 0 0 8px 0;
        letter-spacing: 0.5px;
        background: linear-gradient(120deg, #ffffff 0%, #94a3b8 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .card-description {
        font-size: 14px;
        color: #64748b;
        line-height: 1.5;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="glow-card">
      <h3 class="card-title">Quantum Compute Nodes</h3>
      <p class="card-description">
        Deploy hyper-isolated server runtimes on global edge layers with
        reactive low-latency infrastructure routing.
      </p>
    </div>
  </body>
</html>
