<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iOS Toggle Switch</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f5f5f7;
      }

      .toggle-input {
        display: none;
      }

      .toggle-label {
        display: block;
        width: 60px;
        height: 34px;
        background-color: #e9e9ea;
        border-radius: 100px;
        position: relative;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      .toggle-label::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 30px;
        height: 30px;
        background-color: #ffffff;
        border-radius: 50%;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .toggle-input:checked + .toggle-label {
        background-color: #34c759;
      }

      .toggle-input:checked + .toggle-label::after {
        transform: translateX(26px);
      }
    </style>
  </head>
  <body>
    <input type="checkbox" id="ios-toggle" class="toggle-input" />
    <label for="ios-toggle" class="toggle-label"></label>
  </body>
</html>
