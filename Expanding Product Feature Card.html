<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expanding Product Feature Card</title>
    <style>
      /* Dark luxury canvas layout */
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #02040a;
        font-family: system-ui, -apple-system, sans-serif;
      }

      /* THE PRODUCT CARD CONTAINER */
      .feature-card {
        width: 320px;
        background-color: #0b0f19;
        border: 1px solid #1f2937;
        border-radius: 24px;
        padding: 24px;
        box-sizing: border-box;
        color: #ffffff;
        box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.5);

        /* Smoothly transition the frame border and shadow look */
        transition: border-color 0.3s ease, box-shadow 0.3s ease;
      }

      /* CARD HEADER DESIGN */
      .card-header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 12px;
      }

      .icon-box {
        width: 44px;
        height: 44px;
        background-color: rgba(99, 102, 241, 0.1);
        border: 1px solid rgba(99, 102, 241, 0.2);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #818cf8;
        flex-shrink: 0;
      }

      .icon-box svg {
        width: 22px;
        height: 22px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
      }

      .card-title {
        font-size: 18px;
        font-weight: 700;
        margin: 0;
        letter-spacing: -0.3px;
      }

      /* THE EXPANSION ENGINE ROW WRAPPER */
      .expand-wrapper {
        display: grid;
        /* THE TRICK: Set the grid row size to 0 fractions by default to squeeze content shut */
        grid-template-rows: 0fr;
        transition: grid-template-rows 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      }

      /* THE INNER SHIELD CONTAINER 
       Essential element: overflow hidden prevents text from escaping while row height is zero */
      .expand-content {
        overflow: hidden;
      }

      .feature-details {
        padding-top: 8px;
        margin: 0;
        font-size: 14px;
        color: #94a3b8;
        line-height: 1.6;
      }

      /* STATIC SUB-TEXT FOOTER ELEMENT */
      .card-footer-tip {
        margin: 16px 0 0 0;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #475569;
        font-weight: 600;
        transition: color 0.3s ease;
      }

      /* --- THE HOVER REVEAL STATE INTERACTION --- */

      /* Illuminate the card frame on hover */
      .feature-card:hover {
        border-color: #4f46e5;
        box-shadow: 0 20px 40px -10px rgba(79, 70, 229, 0.15);
      }

      /* THE TRICK: Expand the grid template row track to 1 fraction to fit text smoothly */
      .feature-card:hover .expand-wrapper {
        grid-template-rows: 1fr;
      }

      /* Brighten action tip text below description fields */
      .feature-card:hover .card-footer-tip {
        color: #6366f1;
      }
    </style>
  </head>
  <body>
    <div class="feature-card">
      <div class="card-header">
        <div class="icon-box">
          <svg viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"
            />
          </svg>
        </div>
        <h3 class="card-title">Automated Backups</h3>
      </div>

      <div class="expand-wrapper">
        <div class="expand-content">
          <p class="feature-details">
            Secures database infrastructure parameters daily. Includes global
            point-in-time state rollback keys, localized node replication
            routing, and instant hot-swap disaster recovery failover protection.
          </p>
        </div>
      </div>

      <div class="card-footer-tip">Hover to view breakdown</div>
    </div>
  </body>
</html>
