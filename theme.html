<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics Bar Chart</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #03050a;
        font-family: system-ui, -apple-system, sans-serif;
      }
      /* CHART CARD CONTAINER */
      .chart-card {
        width: 380px;
        background-color: #0b0f19;
        border: 1px solid #1f2937;
        border-radius: 20px;
        padding: 28px;
        box-sizing: border-box;
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
      }
      .chart-title {
        color: #ffffff;
        font-size: 16px;
        font-weight: 700;
        margin: 0 0 4px 0;
      }
      .chart-sub {
        color: #64748b;
        font-size: 12px;
        margin: 0 0 28px 0;
      }

      /* THE GRAPH GRID MATRIX CONTAINER */
      .chart-matrix {
        height: 160px;
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 14px;
        align-items: end;
        border-bottom: 1px solid #1f2937;
        padding-bottom: 4px;
      }

      /* THE PROPORTIONAL DATA BARS */
      .bar {
        position: relative;
        cursor: pointer;
        /* THE TRICK: Calculate exact proportional height on the fly using the variable */
        height: calc(var(--val) * 1%);
        background: linear-gradient(180deg, #6366f1 0%, #4f46e5 100%);
        border-radius: 4px 4px 0 0;
        transition: background 0.2s,
          transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .bar:hover {
        background: linear-gradient(180deg, #818cf8 0%, #6366f1 100%);
        transform: scaleX(1.05);
      }

      /* DIGITAL VALUE HOVER TOOLTIP POPUP */
      .bar::before {
        content: attr(data-val);
        position: absolute;
        bottom: 100%;
        left: 50%;
        transform: translateX(-50%) translateY(-8px) scale(0.9);
        background-color: #ffffff;
        color: #02040a;
        font-size: 10px;
        font-weight: 700;
        padding: 4px 6px;
        border-radius: 4px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s, transform 0.2s;
        z-index: 10;
      }
      .bar:hover::before {
        opacity: 1;
        transform: translateX(-50%) translateY(-8px) scale(1);
      }

      /* TIMELINE X-AXIS RUNNER LABELS */
      .axis {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 14px;
        margin-top: 10px;
        text-align: center;
      }
      .axis-day {
        color: #4b5563;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="chart-card">
      <h3 class="chart-title">Data Ingress Volume</h3>
      <p class="chart-sub">Requests processed weekly (millions)</p>

      <div class="chart-matrix">
        <div class="bar" style="--val: 45" data-val="45M"></div>
        <div class="bar" style="--val: 65" data-val="65M"></div>
        <div class="bar" style="--val: 30" data-val="30M"></div>
        <div class="bar" style="--val: 85" data-val="85M"></div>
        <div class="bar" style="--val: 55" data-val="55M"></div>
        <div class="bar" style="--val: 95" data-val="95M"></div>
        <div class="bar" style="--val: 70" data-val="70M"></div>
      </div>

      <div class="axis">
        <span class="axis-day">Mon</span>
        <span class="axis-day">Tue</span>
        <span class="axis-day">Wed</span>
        <span class="axis-day">Thu</span>
        <span class="axis-day">Fri</span>
        <span class="axis-day">Sat</span>
        <span class="axis-day">Sun</span>
      </div>
    </div>
  </body>
</html>
