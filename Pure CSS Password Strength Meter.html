<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pure CSS Password Strength Meter</title>
    <style>
      /* Reset & Base Layout */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #0f172a; /* Sleek Dark Slate */
        font-family: system-ui, -apple-system, sans-serif;
        color: #f1f5f9;
        padding: 20px;
      }

      /* Container Card */
      .password-card {
        background-color: #1e293b;
        padding: 32px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 400px;
      }

      .password-card h2 {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 24px;
        color: #ffffff;
      }

      /* Input Field Container */
      .input-wrapper {
        position: relative;
        margin-bottom: 16px;
      }

      .input-wrapper input {
        width: 100%;
        padding: 14px 16px;
        background-color: #0f172a;
        border: 2px solid #334155;
        border-radius: 8px;
        color: #ffffff;
        font-size: 16px;
        outline: none;
        transition: border-color 0.2s ease;
      }

      .input-wrapper input:focus {
        border-color: #3b82f6; /* Accent blue focus */
      }

      /* ==========================================================================
       STRENGTH METER TRACKS
       ========================================================================== */
      .meter-container {
        display: flex;
        gap: 6px;
        margin-bottom: 20px;
      }

      .meter-bar {
        height: 6px;
        flex: 1;
        background-color: #334155; /* Default empty state color */
        border-radius: 4px;
        transition: background-color 0.3s ease;
      }

      /* ==========================================================================
       DYNAMIC COLOR ENGINE (The Regular Expression State Mechanics)
       ========================================================================== */

      /* Tier 1: Weak (Any characters typed at all) */
      input:not(:placeholder-shown) ~ .meter-container .bar-1 {
        background-color: #ef4444; /* Red */
      }

      /* Tier 2: Medium (At least 6 characters total) */
      input:valid ~ .meter-container .bar-1,
      input:valid ~ .meter-container .bar-2 {
        background-color: #f59e0b; /* Orange/Yellow */
      }

      /* Tier 3: Strong (Matches advanced pattern condition below) */
      /* Pattern criteria: 8+ chars, 1 uppercase, 1 lowercase, 1 number */
      input:not(
          :placeholder-shown
        )[pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"]
        ~ .meter-container
        .meter-bar {
        background-color: #10b981; /* Neon Green */
      }

      /* ==========================================================================
       CHECKLIST INSTRUCTIONS LOGIC
       ========================================================================== */
      .criteria-list {
        list-style: none;
        font-size: 13px;
        color: #94a3b8;
      }

      .criteria-item {
        display: flex;
        align-items: center;
        margin-bottom: 8px;
        transition: color 0.2s ease;
      }

      /* Custom Checkmark Shape Placeholder */
      .criteria-item::before {
        content: "○";
        margin-right: 8px;
        color: #64748b;
        font-weight: bold;
      }

      /* Change rule labels to green when criteria matching passes via specific pattern hacks */

      /* Rule 1: Matches lowercase and uppercase check */
      input[pattern=".*[a-z].*"][pattern=".*[A-Z].*"] ~ .criteria-list .rule-case,
    /* Rule 2: Matches number inclusion */
    input[pattern=".*\d.*"] ~ .criteria-list .rule-number,
    /* Rule 3: Matches minimum length requirement */
    input[pattern=".{8,}"] ~ .criteria-list .rule-length {
        color: #34d399;
      }

      input[pattern=".*[a-z].*"][pattern=".*[A-Z].*"]
        ~ .criteria-list
        .rule-case::before,
      input[pattern=".*\d.*"] ~ .criteria-list .rule-number::before,
      input[pattern=".{8,}"] ~ .criteria-list .rule-length::before {
        content: "✓";
      }
    </style>
  </head>
  <body>
    <div class="password-card">
      <h2>Create Secure Password</h2>

      <!-- The master input element carrying validation requirements -->
      <div class="input-wrapper">
        <input
          type="password"
          id="password"
          placeholder=" "
          required
          pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
        />
      </div>

      <!-- Visual Dynamic Strength Gauge Rows -->
      <div class="meter-container">
        <div class="meter-bar bar-1"></div>
        <div class="meter-bar bar-2"></div>
        <div class="meter-bar bar-3"></div>
      </div>

      <!-- Dynamic Requirement Helper Checklist Feed -->
      <ul class="criteria-list">
        <!-- Target selectors intercept patterns on the input to swap styles below -->
        <li class="criteria-item rule-case">Mix of uppercase & lowercase</li>
        <li class="criteria-item rule-number">Contains at least one number</li>
        <li class="criteria-item rule-length">Minimum 8 characters long</li>
      </ul>
    </div>
  </body>
</html>
