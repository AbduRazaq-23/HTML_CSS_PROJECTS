<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notification Badge Animation</title>
    <style>
      /* Dark application canvas layout staging */
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #030510;
        font-family: system-ui, -apple-system, sans-serif;
      }

      /* THE BELL CONTAINER BASE MAPPING */
      .noti-wrapper {
        position: relative; /* REQUIRED: Anchors the absolute badge precisely over the icon corner */
        width: 48px;
        height: 48px;
        background-color: #0b0f19;
        border: 1px solid #1f2937;
        border-radius: 14px;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #94a3b8;
        cursor: pointer;
        transition: color 0.2s, border-color 0.2s, background-color 0.2s;
      }

      .noti-wrapper:hover {
        color: #ffffff;
        border-color: #374151;
        background-color: #111827;
      }

      .bell-icon {
        width: 24px;
        height: 24px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      /* --- THE PULSING BADGE ENGINE --- */
      .badge-dot {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 8px;
        height: 8px;
        background-color: #ef4444; /* Vivid premium crimson notification red */
        border-radius: 50%;
        z-index: 10;
      }

      /* THE TRICK: Use an absolute pseudo-element layer to generate the infinite ring aura */
      .badge-dot::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background-color: #ef4444;

        /* Bind our modular animation loop configuration */
        animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        z-index: -1;
      }

      /* --- MATHEMATICAL ANIMATION KEYFRAMES --- */
      @keyframes pulse-ring {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        /* Expand outward smoothly while bleeding transparency levels completely to zero */
        70%,
        100% {
          transform: scale(3.5);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div
      class="noti-wrapper"
      role="button"
      aria-label="Notifications Panel Trigger"
    >
      <svg class="bell-icon" viewBox="0 0 24 24">
        <path
          d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"
        />
      </svg>

      <span class="badge-dot"></span>
    </div>
  </body>
</html>
