<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Only Password Strength Meter</title>
    <style>
      /* Dark, minimalist viewport setup */
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #0b0f19;
        font-family: system-ui, -apple-system, sans-serif;
      }

      /* Card Wrapper */
      .password-wrapper {
        background: #111827;
        border: 1px solid #1f2937;
        padding: 30px;
        border-radius: 16px;
        width: 320px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }

      .label {
        display: block;
        color: #9ca3af;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 500;
      }

      /* Input Field Styling */
      .password-input {
        width: 100%;
        padding: 12px 16px;
        background: #1f2937;
        border: 2px solid #374151;
        border-radius: 8px;
        color: white;
        font-size: 16px;
        outline: none;
        box-sizing: border-box;
        transition: border-color 0.3s;
      }

      .password-input:focus {
        border-color: #6366f1;
      }

      /* --- THE METER ENGINE --- */

      /* Meter container track */
      .strength-meter {
        display: flex;
        gap: 6px;
        margin-top: 12px;
      }

      /* Individual meter segments */
      .bar {
        height: 5px;
        flex: 1;
        background: #374151; /* Default empty state */
        border-radius: 10px;
        transition: background-color 0.4s ease;
      }

      /* LEVEL 1: Weak (Any character typed) */
      .password-input:not(:placeholder-shown)
        ~ .strength-meter
        .bar:nth-child(1) {
        background: #ef4444; /* Red */
      }

      /* LEVEL 2: Medium (At least 6 characters - matches regex pattern) */
      .password-input:valid ~ .strength-meter .bar:nth-child(2) {
        background: #f59e0b; /* Orange */
      }

      /* LEVEL 3: Strong (At least 8 characters including a number) */
      /* Note: To keep this 100% CSS, we use a custom data attribute on the container */
      .password-input[id="secure-pass"]:invalid
        ~ .strength-meter
        .bar:nth-child(3) {
        background: #374151;
      }
    </style>
  </head>
  <body>
    <div class="password-wrapper">
      <label class="label" for="pass">Create Password</label>

      <input
        type="password"
        id="pass"
        class="password-input"
        placeholder=" "
        required
        pattern=".{6,}"
      />

      <div class="strength-meter">
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>
  </body>
</html>
