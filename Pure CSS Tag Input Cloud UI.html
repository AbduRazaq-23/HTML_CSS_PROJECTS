<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pure CSS Tag Input Cloud UI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="tag-card">
      <h3>Article Categories</h3>
      <p>Select relevent structural taxonomy nodes for publishing</p>

      <div class="tag-input-container">
        <span class="tag-chip">
          Frontend
          <button class="tag-delete-btn" aria-label="Remove Frontend tag">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-width="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </span>
        <span class="tag-chip">
          UI Design
          <button class="tag-delete-btn" aria-label="Remove UI Design tag">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-width="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </span>
        <span class="tag-chip">
          Pure CSS
          <button class="tag-delete-btn" aria-label="Remove Pure CSS tag">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-width="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </span>
        <span class="tag-chip">
          Web Accessibility
          <button
            class="tag-delete-btn"
            aria-label="Remove Web accessibility tag"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-width="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </span>
        <div class="fake-input-placeholder">Add tag...</div>
      </div>
    </div>
  </body>
</html>
